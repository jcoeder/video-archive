{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-lg-8">
        <div class="card mb-4">
            <div class="card-body">
                <h2 class="card-title">{{ video.title }}</h2>
                <video class="w-100 mb-3" controls>
                    <source src="/{{ video.file_path }}" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <p class="text-muted">
                    Archived: {{ video.date_archived.strftime('%Y-%m-%d %H:%M') }}
                </p>
            </div>
        </div>
    </div>

    <div class="col-lg-4">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Edit Details</h5>
                <form action="{{ url_for('video_detail', video_id=video.id) }}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Categories</label>
                        {% for category in categories %}
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="categories" 
                                   value="{{ category.id }}" id="category{{ category.id }}"
                                   {% if category in video.categories %}checked{% endif %}>
                            <label class="form-check-label" for="category{{ category.id }}">
                                {{ category.name }}
                            </label>
                        </div>
                        {% endfor %}
                    </div>
                    <div class="mb-3">
                        <label for="notes" class="form-label">Notes</label>
                        <textarea class="form-control" id="notes" name="notes" 
                                  rows="5">{{ video.notes or '' }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a href="{{ url_for('index') }}" class="btn btn-secondary">Back to Library</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
